<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Canvas tote bag, ivory -->
  <g>
    <!-- Handles -->
    <path d="M155 115 Q155 70 200 70 Q245 70 245 115" fill="none" stroke="#d4c5a9" stroke-width="10" stroke-linecap="round"/>
    <path d="M155 115 Q155 70 200 70 Q245 70 245 115" fill="none" stroke="#F5EDE0" stroke-width="6" stroke-linecap="round"/>
    <!-- Bag body -->
    <rect x="105" y="115" width="190" height="220" rx="4" fill="#F5EDE0" stroke="#d4c5a9" stroke-width="2"/>
    <!-- Top seam -->
    <line x1="105" y1="130" x2="295" y2="130" stroke="#d4c5a9" stroke-width="1.5" opacity="0.55"/>
    <!-- Bottom seam -->
    <line x1="105" y1="320" x2="295" y2="320" stroke="#d4c5a9" stroke-width="1.5" opacity="0.55"/>
    <!-- Canvas texture hint (subtle verticals) -->
    <line x1="150" y1="135" x2="150" y2="318" stroke="#d4c5a9" stroke-width="0.5" opacity="0.3"/>
    <line x1="200" y1="135" x2="200" y2="318" stroke="#d4c5a9" stroke-width="0.5" opacity="0.3"/>
    <line x1="250" y1="135" x2="250" y2="318" stroke="#d4c5a9" stroke-width="0.5" opacity="0.3"/>
  </g>
</svg>
