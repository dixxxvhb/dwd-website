<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Enamel pins on a cream pin card -->
  <g>
    <!-- Pin card backing -->
    <rect x="50" y="70" width="300" height="260" rx="8" fill="#F5EDE0" stroke="#d4c5a9" stroke-width="2"/>
    <!-- Card hang hole -->
    <circle cx="200" cy="90" r="6" fill="none" stroke="#d4c5a9" stroke-width="2"/>
    <!-- Pin 1: circular dancer (forest green) -->
    <g transform="translate(110 155)">
      <circle cx="0" cy="0" r="38" fill="#1a3d2e" stroke="#0c1f17" stroke-width="2"/>
      <circle cx="0" cy="0" r="34" fill="none" stroke="#f5b5c4" stroke-width="1.5"/>
      <path d="M-14 14 Q-5 -12 5 -3 Q15 8 12 -14" fill="none" stroke="#f5b5c4" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="-8" cy="12" r="3" fill="#f5b5c4"/>
    </g>
    <!-- Pin 2: square pink with star -->
    <g transform="translate(215 155)">
      <rect x="-38" y="-38" width="76" height="76" rx="8" fill="#f5b5c4" stroke="#d88a9a" stroke-width="2"/>
      <path d="M0 -22 L6 -7 L22 -7 L10 3 L14 19 L0 10 L-14 19 L-10 3 L-22 -7 L-6 -7 Z" fill="#0c1f17"/>
    </g>
    <!-- Pin 3: terracotta oval with "dwd" curve -->
    <g transform="translate(110 250)">
      <ellipse cx="0" cy="0" rx="44" ry="34" fill="#C8614B" stroke="#a24d3b" stroke-width="2"/>
      <path d="M-26 -2 Q-10 -18 0 -2 Q10 -18 26 -2" fill="none" stroke="#F5EDE0" stroke-width="3" stroke-linecap="round"/>
      <path d="M-14 12 L14 12" stroke="#F5EDE0" stroke-width="3" stroke-linecap="round"/>
    </g>
    <!-- Pin 4: seafoam circle with arc -->
    <g transform="translate(215 250)">
      <circle cx="0" cy="0" r="36" fill="#6BAF8A" stroke="#4d8968" stroke-width="2"/>
      <path d="M-18 10 Q0 -18 18 10" fill="none" stroke="#F5EDE0" stroke-width="3" stroke-linecap="round"/>
    </g>
    <!-- Subtle card shadow -->
    <line x1="60" y1="325" x2="340" y2="325" stroke="#d4c5a9" stroke-width="1" opacity="0.4"/>
  </g>
</svg>
