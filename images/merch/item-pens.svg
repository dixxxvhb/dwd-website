<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Two classic ballpoint writing pens, laid diagonally -->
  <g>
    <!-- PEN 1: forest green barrel, click-top -->
    <g transform="translate(200 180) rotate(-18) translate(-200 -180)">
      <!-- Writing tip (metal cone + ball point) -->
      <path d="M70 177 L92 173 L92 187 Z" fill="#c9b98e" stroke="#8a7a52" stroke-width="0.8"/>
      <circle cx="68" cy="180" r="1.8" fill="#2a2a2a"/>
      <!-- Grip section (darker) -->
      <rect x="92" y="172" width="14" height="16" rx="1.5" fill="#0c1f17"/>
      <!-- Thin metal ring -->
      <rect x="106" y="172" width="3" height="16" fill="#c9b98e"/>
      <!-- Main barrel -->
      <rect x="109" y="173" width="170" height="14" rx="2.5" fill="#1a3d2e" stroke="#0c1f17" stroke-width="0.8"/>
      <!-- Subtle barrel highlight -->
      <line x1="120" y1="176" x2="270" y2="176" stroke="#2d5a44" stroke-width="1.3" opacity="0.55"/>
      <!-- Brand ring -->
      <rect x="260" y="172" width="6" height="16" fill="#f5b5c4"/>
      <!-- Click-top push button (ivory) -->
      <rect x="279" y="174" width="14" height="12" rx="2" fill="#e8dcc8" stroke="#c9b98e" stroke-width="0.6"/>
      <!-- Clip (attached near top of barrel, extends upward) -->
      <path d="M240 173 L240 158 Q240 154 244 154 L272 154 Q276 154 276 158 L276 180 Q276 182 273 180 L268 176 L240 176 Z"
            fill="#1a3d2e" stroke="#0c1f17" stroke-width="0.8"/>
      <circle cx="268" cy="165" r="1.8" fill="#c9b98e"/>
    </g>

    <!-- PEN 2: terracotta barrel, click-top -->
    <g transform="translate(200 250) rotate(12) translate(-200 -250)">
      <!-- Writing tip -->
      <path d="M70 247 L92 243 L92 257 Z" fill="#c9b98e" stroke="#8a7a52" stroke-width="0.8"/>
      <circle cx="68" cy="250" r="1.8" fill="#2a2a2a"/>
      <!-- Grip section -->
      <rect x="92" y="242" width="14" height="16" rx="1.5" fill="#8a4434"/>
      <!-- Thin metal ring -->
      <rect x="106" y="242" width="3" height="16" fill="#c9b98e"/>
      <!-- Main barrel -->
      <rect x="109" y="243" width="170" height="14" rx="2.5" fill="#C8614B" stroke="#8a4434" stroke-width="0.8"/>
      <!-- Barrel highlight -->
      <line x1="120" y1="246" x2="270" y2="246" stroke="#e88874" stroke-width="1.3" opacity="0.55"/>
      <!-- Brand ring -->
      <rect x="260" y="242" width="6" height="16" fill="#F5EDE0"/>
      <!-- Click-top push button -->
      <rect x="279" y="244" width="14" height="12" rx="2" fill="#F5EDE0" stroke="#c9b98e" stroke-width="0.6"/>
      <!-- Clip -->
      <path d="M240 243 L240 228 Q240 224 244 224 L272 224 Q276 224 276 228 L276 250 Q276 252 273 250 L268 246 L240 246 Z"
            fill="#C8614B" stroke="#8a4434" stroke-width="0.8"/>
      <circle cx="268" cy="235" r="1.8" fill="#c9b98e"/>
    </g>
  </g>
</svg>
