<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- High-waisted dance booty shorts, forest green -->
  <g>
    <!-- Waistband -->
    <rect x="120" y="130" width="160" height="28" rx="3" fill="#14362a" stroke="#0c1f17" stroke-width="2"/>
    <!-- Shorts body -->
    <path d="M120 158 L110 250 Q110 262 122 262 L188 262 Q195 262 198 255 L200 235 L202 255 Q205 262 212 262 L278 262 Q290 262 290 250 L280 158 Z"
          fill="#1a3d2e" stroke="#0c1f17" stroke-width="2" stroke-linejoin="round"/>
    <!-- Center seam -->
    <line x1="200" y1="158" x2="200" y2="240" stroke="#0c1f17" stroke-width="1.5" opacity="0.35"/>
    <!-- Leg openings (darker hem) -->
    <path d="M112 250 Q145 258 188 258 Q192 260 195 255" fill="none" stroke="#0c1f17" stroke-width="2" opacity="0.5"/>
    <path d="M288 250 Q255 258 212 258 Q208 260 205 255" fill="none" stroke="#0c1f17" stroke-width="2" opacity="0.5"/>
    <!-- Waistband seam -->
    <line x1="120" y1="158" x2="280" y2="158" stroke="#0c1f17" stroke-width="1" opacity="0.4"/>
  </g>
</svg>
