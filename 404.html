<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dance With Dixon</title>
  <script>
    // GitHub Pages SPA redirect — preserves hash routing
    // Works with both custom domain and /dwd-website repo path
    var path = window.location.pathname;
    var repo = '/dwd-website';
    if (path.startsWith(repo)) {
      window.location.replace(repo + '/#home');
    } else {
      window.location.replace('/#home');
    }
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
