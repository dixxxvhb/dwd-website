<body>
  <section id="page-analytics" aria-label="Site Analytics" style="min-height:100vh; padding-top:2rem;">

        <img src="images/icons/analytics-icon-192.png" alt="DWD" width="80" height="80" style="margin-bottom: 1.5rem; border-radius: 50%;">
        <h2>Site Analytics</h2>
        <p>Enter access code to view website analytics.</p>
        <form id="analytics-auth-form" class="campaign-auth-form">
          <input type="password" id="analytics-code-input" placeholder="Access code" autocomplete="off" required>
          <button type="submit" class="btn btn-blush">Enter</button>
        </form>
        <div id="analytics-auth-error" class="campaign-auth-error" style="display:none;">Wrong code. Try again.</div>
      </div>
    </div>
    <div id="analytics-dashboard" style="display:none;">
      <!-- Rendered by analytics-dashboard.js -->
